name: Update Weather Calendar

on:
  workflow_dispatch:

  schedule:
    # GitHub cron uses UTC.
    # 11:30 UTC = 6:30 AM Chicago during daylight saving time.
    - cron: "30 11 * * *"

permissions:
  contents: write

jobs:
  update-weather-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather warning script
        run: |
          python weather_watch.py

      - name: Commit updated calendar file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add weather_alerts.ics

          if git diff --cached --quiet; then
            echo "No calendar changes to commit."
          else
            git commit -m "Update weather warning calendar"
            git push
          fi